version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: reno_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reno_usa_db
    ports:
      - "5432:5432"       # Puerto que se expone al host
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: development  # Cambia a 'production' si quieres la versión de producción
    container_name: reno_node
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/reno_usa_db
      JWT_SECRET: mock-jwt-secret
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app      # Para desarrollo, cambios se reflejan automáticamente
    command: npm run dev  # Para producción cambia por: node server.js
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pgdata: